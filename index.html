<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sóc Nâu - Thế Giới Kỳ Thú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Bungee+Shade&family=Fredoka+One&family=Orbitron:wght@400;900&display=swap');

        :root {
            --bg-deep: #020617;
            --glass-bright: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #38bdf8;
            --gold: #fbbf24;
            --error: #f43f5e;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-deep);
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: white;
            touch-action: manipulation;
        }

        #game-wrapper {
            width: 100%;
            max-width: 430px;
            height: 100%;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #1e1b4b, #020617);
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* --- HIỆU ỨNG GIAO DIỆN ĐẦU TĂNG CƯỜNG --- */
        .cyber-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(56, 189, 248, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(56, 189, 248, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            perspective: 500px;
            transform: rotateX(60deg) scale(2);
            transform-origin: top;
            opacity: 0.3;
            pointer-events: none;
        }

        .brand-title-container {
            position: relative;
            padding: 20px;
        }

        .brand-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 4.5rem;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 20%, var(--neon-blue) 50%, var(--accent) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5));
            letter-spacing: -4px;
            position: relative;
            display: inline-block;
        }

        .brand-title::after {
            content: 'SÓC NÂU';
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(255,255,255,0.8), transparent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: scan-text 3s infinite linear;
        }

        @keyframes scan-text {
            0% { clip-path: inset(0 0 100% 0); }
            50% { clip-path: inset(0 0 0 0); }
            100% { clip-path: inset(100% 0 0 0); }
        }

        .icon-energy-ring {
            position: relative;
            display: flex;
            align-items: center; justify-content: center;
        }

        .icon-energy-ring::before {
            content: '';
            position: absolute;
            width: 140%; height: 140%;
            border: 2px dashed var(--neon-blue);
            border-radius: 50%;
            animation: rotate-slow 10s infinite linear;
            opacity: 0.5;
        }

        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .menu-btn-cyber {
            position: relative;
            background: var(--glass-bright);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            transition: all 0.3s;
            overflow: hidden;
        }

        .menu-btn-cyber::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.2), transparent);
            transition: 0.5s;
        }

        .menu-btn-cyber:hover::before {
            left: 100%;
        }

        .menu-btn-cyber .icon-box {
            position: relative;
            background: rgba(0,0,0,0.3);
            box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.3);
            border: 1px solid rgba(56, 189, 248, 0.5);
        }

        .neon-dot {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- CÁC PHẦN CŨ GIỮ NGUYÊN --- */
        .glass-panel {
            background: var(--glass-bright);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .glass-btn-3d {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }
        .glass-btn-3d:active { transform: translateY(4px); box-shadow: none; }

        .item-card {
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.05);
        }

        .item-card.selected-futuristic {
            background: rgba(56, 189, 248, 0.2);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px var(--neon-blue);
            transform: scale(1.1) translateY(-5px);
            animation: pulse-neon 1.5s infinite;
            z-index: 10;
        }

        @keyframes pulse-neon {
            0%, 100% { box-shadow: 0 0 15px var(--neon-blue), inset 0 0 5px var(--neon-blue); }
            50% { box-shadow: 0 0 30px var(--neon-blue), inset 0 0 15px var(--neon-blue); }
        }

        .drop-target {
            width: 85px; height: 85px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }
        .shadow-obj { filter: brightness(0); opacity: 0.85; transform: scale(1.1); transition: 0.3s; }

        .falling-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none; overflow: hidden; }
        .theme-particle { position: absolute; top: -30px; animation: float-down linear infinite; opacity: 0.7; }
        @keyframes float-down { 
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            100% { transform: translateY(400px) rotate(360deg); opacity: 0; }
        }

        .counting-item { cursor: pointer; transition: all 0.3s; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .counting-active { transform: scale(1.3); filter: drop-shadow(0 0 15px var(--accent)); z-index: 50; }

        .room-bg-simple {
            width: 94%; height: 280px;
            background: linear-gradient(180deg, #1e293b 0%, #334155 100%);
            border-radius: 32px; position: relative; margin: 10px auto;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .room-floor { height: 25%; background: #0f172a; width: 100%; border-top: 2px solid var(--accent); }
        
        .futuristic-bin {
            width: 100px; height: 140px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px); border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px 24px 40px 40px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .futuristic-bin::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: var(--glow-color); box-shadow: 0 0 15px var(--glow-color); }
        .futuristic-bin.active-glow { transform: scale(1.05); border-color: var(--glow-color); box-shadow: 0 0 30px var(--glow-color), inset 0 0 20px var(--glow-color); }

        .trash-obj { font-size: 3.5rem; cursor: pointer; transition: 0.3s; z-index: 10; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); }
        .trash-obj.selected { transform: scale(1.3) translateY(-15px); filter: drop-shadow(0 0 30px var(--gold)); animation: pulse-gold 1.5s infinite; }

        @keyframes pulse-gold { 0% { filter: drop-shadow(0 0 10px var(--gold)); } 50% { filter: drop-shadow(0 0 25px var(--gold)); } 100% { filter: drop-shadow(0 0 10px var(--gold)); } }

        .choice-btn-big { min-width: 75px; height: 75px; font-size: 1.8rem; font-weight: 800; color: white; background: var(--glass-bright); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; align-items: center; justify-content: center; }

        .hidden-screen { display: none !important; }
        .sparkle { position: absolute; pointer-events: none; z-index: 999; animation: fly 0.8s ease-out forwards; }
        @keyframes fly { 0% { transform: translate(-50%,-50%) scale(0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.8); opacity: 0; } }
        
        .shake-error { animation: shake-err 0.5s ease-in-out; border-color: var(--error) !important; background: rgba(244, 63, 94, 0.3) !important; box-shadow: 0 0 20px var(--error) !important; }
        @keyframes shake-err { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }

        .success-bg-glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); opacity: 0.3; filter: blur(30px); }
        .futuristic-btn-next { position: relative; overflow: hidden; background: linear-gradient(90deg, #0ea5e9, #2dd4bf); border: 2px solid rgba(255,255,255,0.4); color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(14, 165, 233, 0.5); }
        .success-title-neon { font-family: 'Fredoka One', cursive; text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); }
        .floating-star { position: absolute; font-size: 2rem; animation: star-float 3s infinite ease-in-out; }
        @keyframes star-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(20deg); } }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div class="cyber-grid"></div>

        <!-- Main Menu -->
        <div id="main-menu" class="h-full flex flex-col items-center justify-center p-8 animate__animated animate__fadeIn z-10">
            <div class="mb-10 text-center relative brand-title-container">
                <!-- Decorative Elements -->
                <div class="neon-dot" style="top:0; left:0;"></div>
                <div class="neon-dot" style="top:0; right:0;"></div>
                <div class="neon-dot" style="bottom:0; left:0;"></div>
                <div class="neon-dot" style="bottom:0; right:0;"></div>

                <div class="flex items-center justify-center gap-2 mb-2">
                    <div class="icon-energy-ring">
                        <span class="text-4xl animate__animated animate__pulse animate__infinite">🐿️</span>
                    </div>
                    <h1 class="brand-title">SÓC NÂU</h1>
                    <div class="icon-energy-ring">
                        <span class="text-4xl animate__animated animate__pulse animate__infinite animate__delay-1s">⚡</span>
                    </div>
                </div>
                <div class="h-[2px] w-48 bg-gradient-to-r from-transparent via-cyan-400 to-transparent mx-auto rounded-full shadow-[0_0_10px_#00f2ff]"></div>
                <p class="text-[10px] uppercase tracking-[0.5em] mt-4 text-cyan-300 font-black">Neural Learning System v2.5</p>
            </div>
            
            <div class="grid grid-cols-1 gap-4 w-full">
                <button onclick="startGame('shadow')" class="menu-btn-cyber p-5 flex items-center gap-5 active:scale-95 border-r-2 border-r-cyan-500/50">
                    <div class="icon-box w-14 h-14 rounded-2xl flex items-center justify-center text-3xl">🔭</div>
                    <div class="text-left"><b class="text-white text-lg tracking-wide">Thám Tử Nhí</b><p class="text-[10px] text-cyan-400 font-bold uppercase">Object Identification</p></div>
                </button>
                <button onclick="startGame('count')" class="menu-btn-cyber p-5 flex items-center gap-5 active:scale-95 border-r-2 border-r-amber-500/50">
                    <div class="icon-box w-14 h-14 rounded-2xl flex items-center justify-center text-3xl">🧩</div>
                    <div class="text-left"><b class="text-white text-lg tracking-wide">Học Đếm</b><p class="text-[10px] text-amber-400 font-bold uppercase">Numerical Logic</p></div>
                </button>
                <button onclick="startGame('sort')" class="menu-btn-cyber p-5 flex items-center gap-5 active:scale-95 border-r-2 border-r-emerald-500/50">
                    <div class="icon-box w-14 h-14 rounded-2xl flex items-center justify-center text-3xl">🌀</div>
                    <div class="text-left"><b class="text-white text-lg tracking-wide">Môi Trường</b><p class="text-[10px] text-emerald-400 font-bold uppercase">Habitat Categorization</p></div>
                </button>
                <button onclick="startGame('trash')" class="menu-btn-cyber p-5 flex items-center gap-5 active:scale-95 border-r-2 border-r-rose-500/50">
                    <div class="icon-box w-14 h-14 rounded-2xl flex items-center justify-center text-3xl">🛡️</div>
                    <div class="text-left"><b class="text-white text-lg tracking-wide">Chiến Binh</b><p class="text-[10px] text-rose-400 font-bold uppercase">Ecological Protocol</p></div>
                </button>
            </div>

            <div class="mt-8 opacity-40 text-[9px] font-mono flex gap-4">
                <span>SYSTEM: READY</span>
                <span>LINK: STABLE</span>
                <span>ENCRYPTION: ON</span>
            </div>
        </div>

        <!-- Play Area -->
        <div id="game-play" class="hidden-screen h-full flex flex-col p-5 z-20">
            <header class="flex justify-between items-center mb-6">
                <button onclick="backToMenu()" class="glass-panel w-14 h-14 flex items-center justify-center text-2xl glass-btn-3d">🏠</button>
                <div class="glass-panel px-8 py-3 text-gold font-black text-xl tracking-widest border-b-2 border-gold/30">⭐ <span id="score-val">0</span></div>
            </header>
            <div id="game-content" class="flex-grow flex flex-col items-center justify-center w-full relative"></div>
        </div>

        <!-- Mode Selector for Counting -->
        <div id="mode-selector" class="hidden-screen absolute inset-0 z-[110] flex items-center justify-center bg-black/80 backdrop-blur-md">
            <div class="glass-panel p-10 text-center w-80 flex flex-col gap-6 border-2 border-cyan-500/30">
                <h3 class="text-2xl font-bold font-mono tracking-tighter">SELECT DIFFICULTY</h3>
                <button onclick="setCountMode('easy')" class="bg-cyan-600/40 border border-cyan-500 py-4 rounded-2xl font-bold text-xl active:scale-95 transition">LEVEL 01: BEGINNER</button>
                <button onclick="setCountMode('hard')" class="bg-rose-600/40 border border-rose-500 py-4 rounded-2xl font-bold text-xl active:scale-95 transition">LEVEL 02: ADVANCED</button>
            </div>
        </div>

        <!-- Improved Success Modal -->
        <div id="success-modal" class="hidden-screen absolute inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-2xl">
            <div class="success-bg-glow"></div>
            <div class="glass-panel p-10 text-center animate__animated animate__backInDown w-[340px] relative overflow-hidden border-2 border-cyan-500">
                <div class="floating-star" style="top: 10%; left: 10%;">✨</div>
                <div class="floating-star" style="bottom: 20%; right: 10%; animation-delay: 1s">🌟</div>
                <div class="text-8xl mb-4 animate__animated animate__tada animate__infinite animate__slow">🏆</div>
                <h2 id="success-msg" class="text-4xl font-black text-white mb-2 success-title-neon">MISSION CLEAR</h2>
                <p class="text-blue-300 text-[10px] mb-10 font-bold tracking-widest uppercase">System Synchronization Complete</p>
                <button id="next-btn" class="w-full py-5 futuristic-btn-next text-white font-black rounded-2xl glass-btn-3d">PROCEED TO NEXT ➔</button>
            </div>
        </div>
    </div>

    <script>
        const ASSETS = {
            animals: [
                { id: 'a1', e: '🦁', h: 'land' }, { id: 'a2', e: '🐘', h: 'land' },
                { id: 'a3', e: '🐒', h: 'land' }, { id: 'a4', e: '🐟', h: 'water' },
                { id: 'a5', e: '🦈', h: 'water' }, { id: 'a6', e: '🐙', h: 'water' },
                { id: 'a7', e: '🐯', h: 'land' }, { id: 'a8', e: '🦀', h: 'water' },
                { id: 'a9', e: '🦒', h: 'land' }, { id: 'a10', e: '🐋', h: 'water' },
                { id: 'a11', e: '🦓', h: 'land' }, { id: 'a12', e: '🦭', h: 'water' },
                { id: 'a13', e: '🐼', h: 'land' }, { id: 'a14', e: '🦐', h: 'water' },
                { id: 'a15', e: '🐻', h: 'land' }, { id: 'a16', e: '🐠', h: 'water' },
                { id: 'a17', e: '🦘', h: 'land' }, { id: 'a18', e: '🐢', h: 'water' }
            ],
            trash: [
                { id: 't1', e: '🍼', type: 'recycle' }, { id: 't2', e: '🥤', type: 'recycle' },
                { id: 't3', e: '📰', type: 'paper' }, { id: 't4', e: '📦', type: 'paper' },
                { id: 't5', e: '🍌', type: 'bio' }, { id: 't6', e: '🍎', type: 'bio' },
                { id: 't7', e: '🥫', type: 'recycle' }, { id: 't8', e: '📄', type: 'paper' },
                { id: 't9', e: '🍕', type: 'bio' }, { id: 't10', e: '🍐', type: 'bio' }
            ],
            themes: [
                { n: 'Ong', e: '🐝', p: '🌸' }, { n: 'Chim cánh cụt', e: '🐧', p: '❄️' },
                { n: 'Cá', e: '🐟', p: '🫧' }, { n: 'Khỉ', e: '🐒', p: '🍃' },
                { n: 'Gà', e: '🐥', p: '🌾' }, { n: 'Ếch', e: '🐸', p: '🍄' }
            ],
            praises: ["XUẤT SẮC!", "THIÊN TÀI!", "GIỎI QUÁ!", "SIÊU NHÂN!", "TUYỆT VỜI!", "ĐỈNH CAO!"]
        };

        let state = { 
            type: '', score: 0, active: null, matched: 0, 
            countMode: 'easy', usedAnimals: [], usedTrash: [], usedThemes: []
        };

        function sfx(f=440, type='sine', dur=0.4) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.type = type; o.connect(g); g.connect(ctx.destination);
            o.frequency.setValueAtTime(f, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
            o.start(); o.stop(ctx.currentTime + dur);
        }

        function playError() { sfx(100, 'sawtooth', 0.5); }

        function sparkles(x, y, char='✨') {
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.className = 'sparkle'; p.innerText = char;
                p.style.left = x+'px'; p.style.top = y+'px';
                const a = Math.random()*Math.PI*2; const d = 60+Math.random()*80;
                p.style.setProperty('--tx', `${Math.cos(a)*d}px`);
                p.style.setProperty('--ty', `${Math.sin(a)*d}px`);
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function startGame(t) {
            state.type = t; 
            state.score = 0;
            state.usedAnimals = [];
            state.usedTrash = [];
            state.usedThemes = [];
            document.getElementById('main-menu').classList.add('hidden-screen');
            document.getElementById('game-play').classList.remove('hidden-screen');
            if(t === 'count') {
                document.getElementById('mode-selector').classList.remove('hidden-screen');
            } else {
                loadLevel();
            }
        }

        function setCountMode(mode) {
            state.countMode = mode;
            document.getElementById('mode-selector').classList.add('hidden-screen');
            loadLevel();
        }

        function backToMenu() {
            document.getElementById('main-menu').classList.remove('hidden-screen');
            document.getElementById('game-play').classList.add('hidden-screen');
            document.getElementById('success-modal').classList.add('hidden-screen');
            document.getElementById('mode-selector').classList.add('hidden-screen');
        }

        function getDiversifiedAssets(source, count, tracker) {
            let available = source.filter(item => !tracker.includes(item.id));
            if (available.length < count) { tracker.length = 0; available = [...source]; }
            const selected = available.sort(() => 0.5 - Math.random()).slice(0, count);
            selected.forEach(item => tracker.push(item.id));
            return selected;
        }

        function loadLevel() {
            document.getElementById('score-val').innerText = state.score;
            document.getElementById('success-modal').classList.add('hidden-screen');
            const container = document.getElementById('game-content');
            container.innerHTML = ''; state.active = null; state.matched = 0;
            if(state.type === 'shadow') initShadow(container);
            if(state.type === 'count') initCount(container);
            if(state.type === 'sort') initSort(container);
            if(state.type === 'trash') initTrash(container);
        }

        function initShadow(container) {
            const selected = getDiversifiedAssets(ASSETS.animals, 6, state.usedAnimals);
            const shuffled = [...selected].sort(()=>.5-Math.random());
            const topRow = document.createElement('div');
            topRow.className = "grid grid-cols-3 gap-5 mb-10";
            selected.forEach(a => {
                const zone = document.createElement('div');
                zone.className = "drop-target";
                zone.innerHTML = `<div class="text-5xl shadow-obj" id="target-${a.id}">${a.e}</div>`;
                zone.onclick = (e) => {
                    if(state.active === a.id) {
                        sfx(800, 'triangle'); sparkles(e.clientX, e.clientY);
                        document.getElementById(`target-${a.id}`).classList.remove('shadow-obj');
                        document.querySelector(`[data-id="${a.id}"]`).style.visibility = 'hidden';
                        state.active = null; state.matched++;
                        if(state.matched === 6) { state.score += 150; setTimeout(win, 600); }
                    } else if(state.active) { playError(); zone.classList.add('shake-error'); setTimeout(()=>zone.classList.remove('shake-error'), 500); }
                };
                topRow.appendChild(zone);
            });
            const bottomRow = document.createElement('div');
            bottomRow.className = "grid grid-cols-6 gap-2 p-3 glass-panel w-full";
            shuffled.forEach(a => {
                const item = document.createElement('div');
                item.className = "item-card active:scale-90";
                item.innerText = a.e; item.dataset.id = a.id;
                item.onclick = () => {
                    sfx(600); 
                    document.querySelectorAll('.item-card').forEach(x => x.classList.remove('selected-futuristic'));
                    state.active = a.id; item.classList.add('selected-futuristic');
                };
                bottomRow.appendChild(item);
            });
            container.append(topRow, bottomRow);
        }

        function initCount(container) {
            const theme = getDiversifiedAssets(ASSETS.themes, 1, state.usedThemes)[0];
            let targetNum = (state.countMode === 'easy') ? Math.floor(Math.random() * 11) : 11 + Math.floor(Math.random() * 10);
            const frame = document.createElement('div');
            frame.className = "w-full min-h-[250px] glass-panel mb-8 flex flex-wrap items-center justify-center p-6 gap-2 relative overflow-hidden";
            const pLayer = document.createElement('div');
            pLayer.className = "falling-container";
            for(let i=0; i<12; i++) {
                const p = document.createElement('div'); p.className = "theme-particle"; p.innerText = theme.p;
                p.style.left = Math.random()*100 + "%"; p.style.animationDuration = (3 + Math.random()*4) + "s";
                pLayer.appendChild(p);
            }
            frame.appendChild(pLayer);
            for(let i=0; i<targetNum; i++) {
                const e = document.createElement('div');
                e.className = `counting-item animate__animated animate__bounceIn ${state.countMode === 'hard' ? 'text-3xl' : 'text-5xl'}`;
                e.innerText = theme.e;
                e.onclick = (ev) => {
                    if(!e.classList.contains('counting-active')) { sfx(500); e.classList.add('counting-active'); sparkles(ev.clientX, ev.clientY, theme.p); }
                };
                frame.appendChild(e);
            }
            const options = document.createElement('div');
            options.className = "flex gap-4 flex-wrap justify-center";
            let choiceSet = new Set([targetNum]);
            while(choiceSet.size < 3) {
                let r = (state.countMode === 'easy') ? Math.floor(Math.random() * 11) : 11 + Math.floor(Math.random() * 10);
                choiceSet.add(r);
            }
            Array.from(choiceSet).sort((a,b)=>a-b).forEach(n => {
                const btn = document.createElement('div');
                btn.className = "choice-btn-big glass-btn-3d active:scale-95"; btn.innerText = n;
                btn.onclick = (e) => {
                    if(n === targetNum) { sfx(1000, 'triangle'); sparkles(e.clientX, e.clientY); state.score += 50; win(); }
                    else { playError(); btn.classList.add('shake-error'); setTimeout(()=>btn.classList.remove('shake-error'), 500); }
                };
                options.appendChild(btn);
            });
            container.append(frame, options);
        }

        function initSort(container) {
            const list = getDiversifiedAssets(ASSETS.animals, 6, state.usedAnimals);
            const envs = document.createElement('div'); envs.className = "w-full flex gap-4 mb-8";
            const zones = [{ id: 'land', n: 'Trên cạn', e: '🌳', bg: 'bg-emerald-900/40' }, { id: 'water', n: 'Dưới nước', e: '🌊', bg: 'bg-blue-900/40' }];
            zones.forEach(z => {
                const box = document.createElement('div');
                box.className = `flex-1 aspect-square glass-panel ${z.bg} flex flex-col items-center justify-center p-3 relative overflow-hidden`;
                box.innerHTML = `<span class="text-6xl opacity-10 absolute top-2 right-2">${z.e}</span><b class="text-white uppercase text-[11px] mb-auto">${z.n}</b><div id="drop-${z.id}" class="flex flex-wrap gap-1 justify-center mb-auto"></div>`;
                box.onclick = (e) => {
                    if(!state.active) return;
                    const animal = list.find(a => a.id === state.active);
                    if(animal.h === z.id) {
                        sfx(1100, 'triangle'); sparkles(e.clientX, e.clientY);
                        document.getElementById(`drop-${z.id}`).innerHTML += `<span class="text-3xl animate__animated animate__zoomIn">${animal.e}</span>`;
                        document.querySelector(`[data-id="${state.active}"]`).style.visibility = 'hidden';
                        state.active = null; state.matched++;
                        if(state.matched === 6) { state.score += 150; setTimeout(win, 800); }
                    } else { playError(); box.classList.add('shake-error'); setTimeout(()=>box.classList.remove('shake-error'), 500); }
                };
                envs.appendChild(box);
            });
            const pool = document.createElement('div');
            pool.className = "grid grid-cols-3 gap-4 p-5 glass-panel w-full";
            list.forEach(a => {
                const item = document.createElement('div');
                item.className = "item-card active:scale-90"; item.innerText = a.e; item.dataset.id = a.id;
                item.onclick = () => {
                    sfx(600); document.querySelectorAll('.item-card').forEach(x => x.classList.remove('selected-futuristic'));
                    state.active = a.id; item.classList.add('selected-futuristic');
                };
                pool.appendChild(item);
            });
            container.append(envs, pool);
        }

        function initTrash(container) {
            const list = getDiversifiedAssets(ASSETS.trash, 6, state.usedTrash);
            const room = document.createElement('div'); room.className = "room-bg-simple"; room.innerHTML = `<div class="room-floor"></div>`;
            list.forEach(t => {
                const obj = document.createElement('div'); obj.className = "trash-obj absolute"; obj.innerText = t.e; obj.dataset.id = t.id;
                obj.style.left = (10 + Math.random() * 75) + "%"; obj.style.top = (35 + Math.random() * 40) + "%";
                obj.onclick = (e) => { sfx(400); document.querySelectorAll('.trash-obj').forEach(x => x.classList.remove('selected')); state.active = t.id; obj.classList.add('selected'); e.stopPropagation(); };
                room.appendChild(obj);
            });
            const binsRow = document.createElement('div'); binsRow.className = "flex justify-around w-full mt-8 gap-4";
            const bins = [{ type: 'recycle', i: '♻️', n: 'Tái chế', glow: '#38bdf8' }, { type: 'paper', i: '📦', n: 'Giấy', glow: '#fb923c' }, { type: 'bio', i: '🍎', n: 'Hữu cơ', glow: '#4ade80' }];
            bins.forEach(b => {
                const bin = document.createElement('div'); bin.className = "futuristic-bin glass-btn-3d active:scale-95";
                bin.style.setProperty('--glow-color', b.glow); bin.dataset.type = b.type;
                bin.innerHTML = `<div class="absolute inset-0 opacity-10" style="background: radial-gradient(circle at center, ${b.glow}, transparent)"></div><span class="text-5xl mb-2 z-10">${b.i}</span><span class="text-[10px] font-black uppercase text-white z-10 opacity-80">${b.n}</span>`;
                bin.onclick = (e) => {
                    if(!state.active) return;
                    const item = list.find(x => x.id === state.active);
                    if(item.type === b.type) {
                        sfx(1200, 'square'); sparkles(e.clientX, e.clientY, b.i); bin.classList.add('active-glow'); setTimeout(() => bin.classList.remove('active-glow'), 600);
                        const el = document.querySelector(`[data-id="${state.active}"]`);
                        el.style.transform = "scale(0) translateY(120px)"; el.style.opacity = "0";
                        state.active = null; state.matched++;
                        if(state.matched === 6) { state.score += 150; setTimeout(win, 800); }
                    } else { playError(); bin.classList.add('shake-error'); setTimeout(()=>bin.classList.remove('shake-error'), 500); }
                };
                binsRow.appendChild(bin);
            });
            container.append(room, binsRow);
        }

        function win() {
            const praise = ASSETS.praises[Math.floor(Math.random() * ASSETS.praises.length)];
            document.getElementById('success-msg').innerText = praise;
            document.getElementById('success-modal').classList.remove('hidden-screen');
            document.getElementById('next-btn').onclick = () => loadLevel();
            sfx(600); setTimeout(() => sfx(800), 150); setTimeout(() => sfx(1000), 300);
        }
    </script>
</body>
</html>
